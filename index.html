<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arca — Search</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap');

:root {
  --bg: #f5f2eb;
  --surface: #ffffff;
  --border: #e5e0d5;
  --text: #18160f;
  --muted: #9a9487;
  --faint: rgba(24,22,15,.05);
  --accent: #1d4ed8;
  --accent-light: #eff3ff;
  --green: #059669;
  --green-light: #ecfdf5;
  --shadow: 0 1px 4px rgba(0,0,0,.05), 0 4px 20px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.09), 0 2px 8px rgba(0,0,0,.05);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(24,22,15,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(24,22,15,.025) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none; z-index: 0;
}

/* HOME */
#homeState {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px;
}

.home-logo {
  font-family: 'Instrument Serif', serif;
  font-size: 56px; letter-spacing: -.5px;
  margin-bottom: 10px;
  animation: rise .6s ease forwards;
}
.home-logo span { color: var(--accent); }

.home-tagline {
  font-size: 14px; color: var(--muted); font-weight: 300;
  margin-bottom: 40px; letter-spacing: .2px;
  animation: rise .6s ease forwards .1s; opacity: 0;
}

.home-search {
  width: 100%; max-width: 560px;
  display: flex; align-items: center;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px; padding: 14px 18px; gap: 12px;
  box-shadow: var(--shadow-lg);
  transition: border-color .2s, box-shadow .2s;
  animation: rise .6s ease forwards .2s; opacity: 0;
}
.home-search:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(29,78,216,.08), var(--shadow-lg);
}
.home-search svg { color: var(--muted); flex-shrink: 0; }
.home-search input {
  flex: 1; border: none; outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px; background: transparent; color: var(--text);
}
.home-search input::placeholder { color: var(--muted); }

.home-btn {
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  padding: 9px 22px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: opacity .2s; flex-shrink: 0;
}
.home-btn:hover { opacity: .88; }

.home-hints {
  display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center;
  animation: rise .6s ease forwards .35s; opacity: 0;
}
.home-hint {
  font-size: 12px; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; cursor: pointer;
  transition: all .2s;
}
.home-hint:hover { border-color: var(--accent); color: var(--accent); }

/* RESULTS */
#resultsState { display: none; position: relative; z-index: 1; min-height: 100vh; }

.topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(245,242,235,.93);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px;
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 20px; letter-spacing: -.3px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.logo span { color: var(--accent); }

.topbar-search {
  flex: 1; max-width: 580px;
  display: flex; align-items: center;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 11px; padding: 9px 14px; gap: 10px;
  transition: border-color .2s, box-shadow .2s;
}
.topbar-search:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(29,78,216,.07);
}
.topbar-search svg { color: var(--muted); flex-shrink: 0; }
.topbar-search input {
  flex: 1; border: none; outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; background: transparent; color: var(--text);
}
.topbar-search input::placeholder { color: var(--muted); }

.topbar-btn {
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  padding: 8px 18px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: opacity .2s; flex-shrink: 0;
}
.topbar-btn:hover { opacity: .88; }

.chips-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 24px; overflow-x: auto;
  border-bottom: 1px solid var(--border);
  scrollbar-width: none; background: var(--bg);
  position: sticky; top: 57px; z-index: 100;
}
.chips-bar::-webkit-scrollbar { display: none; }
.chips-label {
  font-size: 11px; font-weight: 500; color: var(--muted);
  letter-spacing: .5px; white-space: nowrap; flex-shrink: 0;
}
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: all .2s; color: var(--text);
  flex-shrink: 0;
}
.chip:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.answer-card {
  margin: 20px 24px 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px; padding: 20px 22px;
  display: flex; gap: 16px; align-items: flex-start;
  box-shadow: var(--shadow);
  animation: fadeUp .4s ease;
}
.answer-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent-light);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.answer-body h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.answer-body p { font-size: 13px; line-height: 1.7; color: #555; }
.answer-meta {
  display: flex; gap: 8px; margin-top: 10px;
  align-items: center; flex-wrap: wrap;
}
.answer-src {
  font-size: 11px; color: var(--accent);
  background: var(--accent-light);
  padding: 3px 10px; border-radius: 8px; font-weight: 500;
}
.answer-time { font-size: 11px; color: var(--muted); }

.result-meta {
  padding: 14px 24px 2px;
  font-size: 12px; color: var(--muted);
}

.results { padding: 10px 0 140px; }

.lane { margin-bottom: 4px; animation: fadeUp .4s ease both; }
.lane:nth-child(1) { animation-delay: .05s; }
.lane:nth-child(2) { animation-delay: .1s; }
.lane:nth-child(3) { animation-delay: .15s; }
.lane:nth-child(4) { animation-delay: .2s; }
.lane:nth-child(5) { animation-delay: .25s; }
.lane:nth-child(6) { animation-delay: .3s; }

.lane-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px 8px;
}
.lane-title { display: flex; align-items: center; gap: 8px; }
.lane-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.lane-name { font-size: 13px; font-weight: 600; }
.lane-count { font-size: 12px; color: var(--muted); margin-left: 4px; }
.lane-divider { height: 1px; background: var(--border); margin: 0 24px; opacity: .6; }

.lane-scroll {
  display: flex; gap: 12px;
  padding: 4px 24px 16px;
  overflow-x: auto; scrollbar-width: none;
}
.lane-scroll::-webkit-scrollbar { display: none; }

.card {
  min-width: 272px; max-width: 272px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  box-shadow: var(--shadow); flex-shrink: 0;
  cursor: pointer; transition: all .2s;
  position: relative; display: flex; flex-direction: column; gap: 8px;
}
.card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.card.selected {
  border-color: var(--green);
  box-shadow: 0 0 0 2px rgba(5,150,105,.15), var(--shadow);
}

.card-top { display: flex; align-items: flex-start; gap: 10px; }
.card-check { width: 20px; flex-shrink: 0; padding-top: 1px; }
.card-checkbox {
  width: 15px; height: 15px;
  border-radius: 4px; cursor: pointer;
  accent-color: var(--green);
}

.card-source-row {
  display: flex; align-items: center; gap: 6px;
  flex: 1; min-width: 0;
}
.card-favicon {
  width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0;
  background: var(--faint);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.card-favicon img { width: 100%; height: 100%; object-fit: contain; }
.card-display-url {
  font-size: 11px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
.source-marker { font-size: 11px; flex-shrink: 0; }

.card-title {
  font-size: 13px; font-weight: 600; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-snippet {
  font-size: 12px; color: #666; line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
.tag { font-size: 10.5px; padding: 2px 8px; border-radius: 5px; font-weight: 500; }
.tag-blue   { background: #eff3ff; color: #1d4ed8; }
.tag-green  { background: #ecfdf5; color: #065f46; }
.tag-amber  { background: #fffbeb; color: #92400e; }
.tag-purple { background: #fdf4ff; color: #7e22ce; }
.tag-red    { background: #fef2f2; color: #991b1b; }
.tag-gray   { background: #f3f4f6; color: #4b5563; }

.loading-card {
  min-width: 272px; height: 160px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; flex-shrink: 0; overflow: hidden; position: relative;
}
.loading-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
  animation: shimmer 1.4s infinite;
}
.skel-bar {
  height: 13px; border-radius: 6px; background: var(--border); margin-bottom: 10px;
}

#chatPanel {
  position: fixed; top: 0; right: -340px;
  width: 320px; height: 100vh;
  background: var(--surface);
  border-left: 1.5px solid var(--border);
  box-shadow: var(--shadow-lg);
  z-index: 300; display: flex; flex-direction: column;
  transition: right .3s cubic-bezier(.4,0,.2,1);
}
#chatPanel.open { right: 0; }

.chat-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.chat-header-left { display: flex; flex-direction: column; gap: 3px; }
.chat-title { font-size: 14px; font-weight: 600; }
.chat-subtitle { font-size: 11.5px; color: var(--muted); }
.chat-close {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1.5px solid var(--border); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--muted); transition: all .2s;
}
.chat-close:hover { background: var(--faint); color: var(--text); }

.chat-suggested {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
}
.chat-sug-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 2px;
}
.suggested-q {
  background: var(--faint); border: 1.5px solid var(--border);
  border-radius: 9px; padding: 8px 12px;
  font-size: 12px; cursor: pointer; transition: all .2s;
  text-align: left; color: var(--text);
  font-family: 'DM Sans', sans-serif;
}
.suggested-q:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.msg-user {
  align-self: flex-end; max-width: 85%;
  background: var(--accent); color: #fff;
  border-radius: 12px 12px 3px 12px;
  padding: 10px 14px; font-size: 13px; line-height: 1.5;
}
.msg-ai {
  align-self: flex-start; max-width: 92%;
  background: var(--faint); border: 1.5px solid var(--border);
  border-radius: 12px 12px 12px 3px;
  padding: 10px 14px; font-size: 13px; line-height: 1.6; color: var(--text);
}
.msg-ai.loading { color: var(--muted); font-style: italic; }

.chat-input-wrap {
  padding: 12px 14px 18px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
}
.chat-input {
  flex: 1; background: var(--faint);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 9px 12px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: var(--text); resize: none;
  outline: none; min-height: 40px; max-height: 120px;
  transition: border-color .2s; line-height: 1.5;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--muted); }
.chat-send {
  background: var(--accent); color: #fff; border: none;
  border-radius: 9px; padding: 9px 16px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: opacity .2s; flex-shrink: 0;
}
.chat-send:hover { opacity: .88; }
.chat-send:disabled { opacity: .35; cursor: not-allowed; }

#selectionDock {
  position: fixed; bottom: -80px; left: 50%;
  transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  border-radius: 14px; padding: 12px 20px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow-lg);
  z-index: 250;
  transition: bottom .3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
}
#selectionDock.visible { bottom: 24px; }

.dock-count { display: flex; align-items: center; gap: 8px; }
.dock-badge {
  background: var(--green); color: #fff;
  border-radius: 6px; padding: 2px 8px;
  font-size: 12px; font-weight: 600;
}
.dock-label { font-size: 13px; opacity: .7; }

.dock-ask {
  background: rgba(255,255,255,.12); color: var(--bg);
  border: 1.5px solid rgba(255,255,255,.2);
  border-radius: 9px; padding: 8px 16px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background .2s;
}
.dock-ask:hover { background: rgba(255,255,255,.22); }

.dock-done {
  font-size: 12px; opacity: .45; cursor: pointer;
  transition: opacity .2s; background: none; border: none;
  color: var(--bg); font-family: 'DM Sans', sans-serif;
}
.dock-done:hover { opacity: .8; }

.state-msg {
  text-align: center; padding: 80px 24px;
  color: var(--muted); font-size: 14px; line-height: 1.8;
}
.state-msg strong {
  display: block; font-size: 18px; color: var(--text); margin-bottom: 8px;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  from { transform: translateX(-100%); }
  to   { transform: translateX(100%); }
}

@media (max-width: 600px) {
  .topbar { padding: 10px 16px; gap: 10px; }
  .chips-bar, .result-meta { padding-left: 16px; padding-right: 16px; }
  .answer-card { margin: 16px 16px 0; }
  .lane-header { padding-left: 16px; padding-right: 16px; }
  .lane-scroll { padding-left: 16px; padding-right: 16px; }
  .lane-divider { margin: 0 16px; }
  #chatPanel { width: 100%; right: -100%; }
  #selectionDock { left: 16px; right: 16px; transform: none; }
}
</style>
</head>
<body>

<div id="homeState">
  <div class="home-logo">Arca<span>.</span></div>
  <div class="home-tagline">40+ sources · Semantic lanes · Ask anything</div>
  <div class="home-search">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="homeInput" placeholder="Search anything…" />
    <button class="home-btn" onclick="doSearch()">Search</button>
  </div>
  <div class="home-hints">
    <span class="home-hint" onclick="fillAndSearch('student jobs in Paris')">student jobs in Paris</span>
    <span class="home-hint" onclick="fillAndSearch('best RAG architecture 2024')">best RAG architecture</span>
    <span class="home-hint" onclick="fillAndSearch('intermittent fasting evidence')">intermittent fasting evidence</span>
  </div>
</div>

<div id="resultsState">
  <div class="topbar">
    <div class="logo" onclick="goHome()">Arca<span>.</span></div>
    <div class="topbar-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="topInput" placeholder="Search…"
        onkeydown="if(event.key==='Enter') doSearch()" />
    </div>
    <button class="topbar-btn" onclick="doSearch()">Search</button>
  </div>

  <div class="chips-bar" id="chipsBar" style="display:none">
    <span class="chips-label">Refine →</span>
    <div id="chipsContainer" style="display:contents"></div>
  </div>

  <div id="mainContent"></div>
</div>

<div id="chatPanel">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="chat-title">Ask about sources</div>
      <div class="chat-subtitle" id="chatSubtitle">0 sources selected</div>
    </div>
    <button class="chat-close" onclick="closeChat()">✕</button>
  </div>
  <div class="chat-suggested" id="chatSuggested" style="display:none"></div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-wrap">
    <textarea class="chat-input" id="chatInput" placeholder="Ask a question about these sources…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"
      oninput="autoResize(this)"></textarea>
    <button class="chat-send" id="chatSendBtn" onclick="sendChat()">Ask</button>
  </div>
</div>

<div id="selectionDock">
  <div class="dock-count">
    <span class="dock-badge" id="dockCount">0</span>
    <span class="dock-label">sources selected</span>
  </div>
  <button class="dock-ask" onclick="openChat()">💬 Ask</button>
  <button class="dock-done" onclick="clearSelection()">Done</button>
</div>

<script>
let currentQuery = '';
let selectedCards = new Set();
let activeChips = new Set();
let chatHistory = [];
let searchData = null;
let cardRegistry = {};
let chatOpen = false;

document.getElementById('homeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const homeVal = document.getElementById('homeInput').value.trim();
  const topVal  = document.getElementById('topInput').value.trim();
  const query   = topVal || homeVal;
  if (!query) return;

  currentQuery = query;
  document.getElementById('homeInput').value = query;
  document.getElementById('topInput').value  = query;

  document.getElementById('homeState').style.display = 'none';
  document.getElementById('resultsState').style.display = 'block';

  clearSelection(false);
  if (chatOpen) closeChat();
  activeChips.clear();
  cardRegistry = {};
  chatHistory  = [];
  document.getElementById('chipsBar').style.display = 'none';
  document.getElementById('chatMessages').innerHTML  = '';

  showLoading();

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${res.status}`);
    }
    searchData = await res.json();
    renderResults(searchData);
  } catch (err) {
    showError(err.message);
  }
}

function fillAndSearch(q) {
  document.getElementById('homeInput').value = q;
  doSearch();
}

function renderResults(data) {
  const content = document.getElementById('mainContent');
  let html = '';

  const ac = data.answerCard || {};
  if (ac.summary || ac.title) {
    const srcs = (ac.sources || []).slice(0, 4)
      .map(s => `<span class="answer-src">${esc(s)}</span>`).join('');
    html += `
    <div class="answer-card">
      <div class="answer-icon">
        <svg width="15" height="15" fill="none" stroke="#1d4ed8" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
        </svg>
      </div>
      <div class="answer-body">
        <h3>${esc(ac.title || currentQuery)}</h3>
        <p>${esc(ac.summary || '')}</p>
        <div class="answer-meta">
          ${srcs}
          ${ac.readingTime ? `<span class="answer-time">${esc(ac.readingTime)}</span>` : ''}
        </div>
      </div>
    </div>`;
  }

  const total = (data.lanes || []).reduce((s, l) => s + (l.results || []).length, 0);
  html += `<div class="result-meta">${total} results across ${(data.lanes||[]).length} categories</div>`;

  html += '<div class="results">';
  (data.lanes || []).forEach((lane, li) => {
    if (!lane.results?.length) return;
    html += renderLane(lane, li);
    html += '<div class="lane-divider"></div>';
  });
  html += '</div>';

  content.innerHTML = html;

  (data.lanes || []).forEach(lane => {
    (lane.results || []).forEach((r, ri) => {
      cardRegistry[mkCardId(lane.id, ri)] = r;
    });
  });

  renderChips(data.refineOptions || []);
}

function renderLane(lane, li) {
  const iconBg = ['#eff3ff','#ecfdf5','#fffbeb','#fdf4ff','#fef2f2','#f0f9ff'][li % 6];
  const cards  = (lane.results || []).map((r, ri) => renderCard(r, lane.id, ri)).join('');
  return `
  <div class="lane">
    <div class="lane-header">
      <div class="lane-title">
        <div class="lane-icon" style="background:${iconBg}">${esc(lane.icon || '🌐')}</div>
        <span class="lane-name">${esc(lane.label)}</span>
        <span class="lane-count">${lane.results.length} result${lane.results.length !== 1 ? 's' : ''}</span>
      </div>
    </div>
    <div class="lane-scroll">${cards}</div>
  </div>`;
}

function renderCard(r, laneId, ri) {
  const id  = mkCardId(laneId, ri);
  const tags = (r.tags || []).map(t =>
    `<span class="tag tag-${esc(t.color || 'gray')}">${esc(t.label)}</span>`
  ).join('');
  const faviconUrl = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(r.displayUrl || '')}&sz=32`;
  return `
  <div class="card" id="${id}">
    <div class="card-top">
      <div class="card-check">
        <input type="checkbox" class="card-checkbox" id="chk-${id}"
          onclick="event.stopPropagation(); toggleCard('${id}')" />
      </div>
      <div class="card-source-row">
        <div class="card-favicon">
          <img src="${faviconUrl}" alt="" loading="lazy" onerror="this.style.display='none'" />
        </div>
        <span class="card-display-url">${esc(r.displayUrl || '')}</span>
        <span class="source-marker" title="${esc(r.sourceLabel || '')}">${esc(r.sourceMarker || '')}</span>
      </div>
    </div>
    <div class="card-title" onclick="openUrl('${escAttr(r.url || '')}')">${esc(r.title || '')}</div>
    <div class="card-snippet">${esc(r.snippet || '')}</div>
    ${tags ? `<div class="card-tags">${tags}</div>` : ''}
  </div>`;
}

function renderChips(refineOptions) {
  const bar = document.getElementById('chipsBar');
  const container = document.getElementById('chipsContainer');
  if (!refineOptions.length) { bar.style.display = 'none'; return; }
  container.innerHTML = refineOptions.flatMap(group =>
    (group.options || []).map(opt => {
      const key = `${group.label}:${opt}`;
      return `<div class="chip" data-key="${escAttr(key)}" onclick="toggleChip(this,'${escAttr(key)}')">${esc(opt)}</div>`;
    })
  ).join('');
  bar.style.display = 'flex';
}

function toggleChip(el, key) {
  if (el.classList.contains('active')) { el.classList.remove('active'); activeChips.delete(key); }
  else { el.classList.add('active'); activeChips.add(key); }
}

function toggleCard(id) {
  const card = document.getElementById(id);
  const chk  = document.getElementById('chk-' + id);
  if (!card) return;
  if (selectedCards.has(id)) {
    selectedCards.delete(id); card.classList.remove('selected');
    if (chk) chk.checked = false;
  } else {
    selectedCards.add(id); card.classList.add('selected');
    if (chk) chk.checked = true;
  }
  updateDock();
}

function updateDock() {
  const dock  = document.getElementById('selectionDock');
  document.getElementById('dockCount').textContent = selectedCards.size;
  if (selectedCards.size > 0) { dock.classList.add('visible'); }
  else { dock.classList.remove('visible'); if (chatOpen) closeChat(); }
  if (chatOpen) {
    document.getElementById('chatSubtitle').textContent =
      `${selectedCards.size} source${selectedCards.size !== 1 ? 's' : ''} selected`;
  }
}

function clearSelection(doUpdateDock = true) {
  selectedCards.forEach(id => {
    const card = document.getElementById(id);
    if (card) card.classList.remove('selected');
    const chk = document.getElementById('chk-' + id);
    if (chk) chk.checked = false;
  });
  selectedCards.clear();
  if (doUpdateDock) updateDock();
}

function openChat() {
  if (selectedCards.size === 0) return;
  document.getElementById('chatSubtitle').textContent =
    `${selectedCards.size} source${selectedCards.size !== 1 ? 's' : ''} selected`;
  document.getElementById('chatPanel').classList.add('open');
  chatOpen = true;
  renderSuggestedQuestions();
  renderChatMessages();
  setTimeout(() => document.getElementById('chatInput').focus(), 350);
}

function closeChat() {
  document.getElementById('chatPanel').classList.remove('open');
  chatOpen = false;
}

function renderSuggestedQuestions() {
  const el = document.getElementById('chatSuggested');
  const qs = [
    `What do these sources agree on about "${currentQuery}"?`,
    `What's the most important takeaway?`,
    `Are there any contradictions or conflicting views?`
  ];
  el.style.display = 'block';
  el.innerHTML = `<div class="chat-sug-label">Suggested</div>` +
    qs.map(q => `<button class="suggested-q" onclick="sendChat(${JSON.stringify(q)})">${esc(q)}</button>`).join('');
}

async function sendChat(textArg) {
  const input    = document.getElementById('chatInput');
  const question = textArg || input.value.trim();
  if (!question) return;
  if (!textArg) { input.value = ''; autoResize(input); }
  document.getElementById('chatSuggested').style.display = 'none';
  chatHistory.push({ role: 'user', text: question });
  const loadingKey = Symbol();
  chatHistory.push({ role: 'ai', text: 'Thinking…', loadingKey, loading: true });
  renderChatMessages();
  document.getElementById('chatSendBtn').disabled = true;
  try {
    const sources = getSelectedSources();
    const res = await fetch('/api/context-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sources, query: currentQuery, question })
    });
    const data = await res.json();
    const answer = data.answer || data.error || 'No answer returned.';
    const idx = chatHistory.findIndex(m => m.loadingKey === loadingKey);
    if (idx >= 0) chatHistory[idx] = { role: 'ai', text: answer };
  } catch (err) {
    const idx = chatHistory.findIndex(m => m.loading);
    if (idx >= 0) chatHistory[idx] = { role: 'ai', text: 'Error: ' + err.message };
  }
  renderChatMessages();
  document.getElementById('chatSendBtn').disabled = false;
  document.getElementById('chatInput').focus();
}

function renderChatMessages() {
  const el = document.getElementById('chatMessages');
  if (!chatHistory.length) { el.innerHTML = ''; return; }
  el.innerHTML = chatHistory
    .map(m => `<div class="msg-${m.role}${m.loading ? ' loading' : ''}">${esc(m.text)}</div>`)
    .join('');
  el.scrollTop = el.scrollHeight;
}

function getSelectedSources() {
  return [...selectedCards].map(id => cardRegistry[id]).filter(Boolean);
}

function showLoading() {
  const skeletonCards = Array(5).fill(0).map(() => `
    <div class="loading-card">
      <div style="padding:14px">
        <div class="skel-bar" style="width:55%"></div>
        <div class="skel-bar" style="width:90%"></div>
        <div class="skel-bar" style="width:70%"></div>
        <div class="skel-bar" style="width:80%;margin-top:18px"></div>
      </div>
    </div>`).join('');
  document.getElementById('mainContent').innerHTML = `
    <div class="answer-card" style="opacity:.35">
      <div class="answer-icon"></div>
      <div style="flex:1">
        <div class="skel-bar" style="width:45%"></div>
        <div class="skel-bar" style="width:85%"></div>
        <div class="skel-bar" style="width:60%"></div>
      </div>
    </div>
    <div class="result-meta" style="opacity:.35">Searching 40+ sources…</div>
    <div class="results">
      ${[0,1,2].map(() => `
        <div class="lane">
          <div class="lane-header">
            <div class="lane-title">
              <div class="lane-icon" style="background:var(--faint)"></div>
              <div class="skel-bar" style="width:90px;margin:0"></div>
            </div>
          </div>
          <div class="lane-scroll">${skeletonCards}</div>
        </div>
        <div class="lane-divider"></div>
      `).join('')}
    </div>`;
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="state-msg">
      <strong>Something went wrong</strong>
      ${esc(msg)}<br><br>
      <small>Make sure SERPER_API_KEY and CLAUDE_API_KEY are set, then try again.</small>
    </div>`;
}

function goHome() {
  document.getElementById('resultsState').style.display = 'none';
  document.getElementById('homeState').style.display   = 'flex';
  clearSelection(false);
  if (chatOpen) closeChat();
  document.getElementById('homeInput').focus();
}

function openUrl(url) {
  if (url) window.open(url, '_blank', 'noopener');
}

function mkCardId(laneId, ri) { return `card-${laneId}-${ri}`; }

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function escAttr(s) {
  return String(s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
</script>
</body>
</html>
